<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PALTECH — Client Report Viewer</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--pr:#005A9C;--ac:#27AE60;--tx:#2C3E50;--bg:#E9ECEF;--bd:#D1D9E0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx)}
#loginScreen{position:fixed;inset:0;background:rgba(0,22,45,.97);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:14px;padding:32px 28px;text-align:center;max-width:340px;width:90%}
.login-box h2{color:var(--pr);margin-bottom:6px}
.login-box p{font-size:.83rem;color:#596A7A;margin-bottom:20px}
.btn-google{display:inline-flex;align-items:center;gap:9px;padding:10px 22px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600}
.btn-google:hover{background:#F8FAFC}
.top-bar{background:var(--pr);color:#fff;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:300}
.top-bar h1{font-size:.9rem;font-weight:700}
.wrap{max-width:1000px;margin:0 auto;padding:18px}
.card{background:#fff;border-radius:10px;padding:16px 18px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);border-top:3px solid var(--pr)}
.ctitle{font-size:.92rem;font-weight:700;color:var(--pr);margin-bottom:10px}
.report-row{border:1px solid var(--bd);border-radius:9px;padding:12px 15px;margin-bottom:8px;cursor:pointer;transition:all .15s;background:#fff}
.report-row:hover{border-color:var(--pr);background:#F0F7FF}
.report-row h4{font-size:.9rem;margin-bottom:2px}
.report-row span{font-size:.75rem;color:#7f8c8d}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-ok{background:#D0F0E0;color:#1A7A40}
.badge-warn{background:#FFF3D0;color:#A07000}
/* detail */
#detail{display:none}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--bd);border-radius:7px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;margin-bottom:12px;color:#596A7A}
.idf-block{border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:12px}
.idf-head{background:#2C3E50;color:#fff;padding:7px 12px;font-size:.82rem;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#3D5166;color:#fff;padding:5px 9px;text-align:left;font-size:.72rem}
td{padding:5px 9px;border-bottom:1px solid #F0F4F8}
.photo-gallery{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-thumb{width:130px;height:90px;object-fit:cover;border-radius:6px;border:1px solid #eee;cursor:pointer}
.sitemap-img{width:100%;display:block;border-radius:8px;cursor:pointer;transition:opacity .15s}
.sitemap-img:hover{opacity:.9}
.sitemap-note{font-size:.72rem;color:#7f8c8d;margin-top:6px;line-height:1.5}
.spinner{display:block;width:24px;height:24px;border:3px solid #ddd;border-top-color:var(--pr);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:#7f8c8d}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:2.2rem">📋</div>
    <h2>Client Report Viewer</h2>
    <p>Enter your credentials to access reports shared with your account.</p>
    <div style="text-align:left;margin-bottom:10px">
      <label style="font-size:.7rem;font-weight:700;color:#7f8c8d;text-transform:uppercase;letter-spacing:.4px">Email</label>
      <input id="loginEmail" type="email" placeholder="your@email.com"
        style="width:100%;margin-top:3px;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none"
        onfocus="this.style.borderColor='#005A9C'" onblur="this.style.borderColor='#ddd'"
        onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div style="text-align:left;margin-bottom:14px">
      <label style="font-size:.7rem;font-weight:700;color:#7f8c8d;text-transform:uppercase;letter-spacing:.4px">Password</label>
      <input id="loginPass" type="password" placeholder="Password"
        style="width:100%;margin-top:3px;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none"
        onfocus="this.style.borderColor='#005A9C'" onblur="this.style.borderColor='#ddd'"
        onkeydown="if(event.key==='Enter')cSignIn()">
    </div>
    <button id="loginBtn" class="btn-google"
      style="width:100%;justify-content:center;background:var(--pr);color:#fff;border-color:var(--pr);margin-bottom:10px"
      onclick="cSignIn()">
      🔐 Sign In
    </button>
    <div>
      <button onclick="forgotPassword()"
        style="background:none;border:none;color:#7f8c8d;font-size:.75rem;cursor:pointer;text-decoration:underline">
        Forgot password?
      </button>
    </div>
    <div id="loginErr" style="color:#E74C3C;font-size:.78rem;margin-top:10px;display:none;line-height:1.4;padding:7px 9px;background:#FFF3F3;border-radius:6px"></div>
  </div>
</div>

<div class="top-bar">
  <h1>📋 PALTECH — My Reports</h1>
  <div style="display:flex;align-items:center;gap:9px;font-size:.78rem">
    <span id="cUserEmail"></span>
    <button style="padding:4px 10px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:none;color:#fff;cursor:pointer;font-size:11px" onclick="cSignOut()">Sign Out</button>
  </div>
</div>

<div class="wrap">
  <!-- LIST VIEW -->
  <div id="listView">
    <div class="card">
      <div class="ctitle">Reports Shared With You</div>
      <div id="reportList"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail">
    <button class="back-btn" onclick="showList()">← Back to Reports</button>
    <div class="card" id="detailHeader"></div>
    <div id="detailSiteMap"></div>
    <div id="detailIdfs"></div>
    <div class="card">
      <div class="ctitle">📷 Photos</div>
      <div id="detailPhotos" class="photo-gallery"></div>
    </div>
  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyC5hauabRSRNg-qsSU_Le7Y541kGiKDv5Q",
  authDomain: "port-mapper-609b8.firebaseapp.com",
  projectId: "port-mapper-609b8",
  storageBucket: "port-mapper-609b8.firebasestorage.app",
  messagingSenderId: "30294256994",
  appId: "1:30294256994:web:a50b5f971d1a1a79c7903b",
  measurementId: "G-XKX8BNEZYK"
};
firebase.initializeApp(FIREBASE_CONFIG);
const auth=firebase.auth(), db=firebase.firestore();

auth.onAuthStateChanged(async user=>{
  if(!user){
    document.getElementById('loginScreen').style.display='flex';
    const btn=document.getElementById('loginBtn');
    if(btn){ btn.disabled=false; btn.textContent='🔐 Sign In'; }
    return;
  }
  // Check profile for active flag
  let displayName=user.displayName||user.email;
  try{
    const profileDoc=await db.collection('users').doc(user.uid).get();
    if(profileDoc.exists){
      const profile=profileDoc.data();
      if(profile.active===false){
        // Account deactivated — block access
        await auth.signOut();
        const err=document.getElementById('loginErr');
        err.textContent='⛔ Your account has been deactivated. Please contact your administrator.';
        err.style.display='block';
        document.getElementById('loginScreen').style.display='flex';
        return;
      }
      if(profile.displayName) displayName=profile.displayName;
    }
  }catch(e){ /* continue even if profile lookup fails */ }
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('cUserEmail').textContent=displayName;
  loadMyReports(user.email);
});

async function cSignIn(){
  const email=(document.getElementById('loginEmail').value||'').trim();
  const pass=document.getElementById('loginPass').value||'';
  const errEl=document.getElementById('loginErr');
  const btn=document.getElementById('loginBtn');
  errEl.style.display='none';
  if(!email||!pass){
    errEl.textContent='Please enter your email address and password.';
    errEl.style.display='block'; return;
  }
  btn.disabled=true; btn.textContent='⏳ Signing in…';
  try{
    await auth.signInWithEmailAndPassword(email,pass);
    // onAuthStateChanged handles the rest
  }catch(e){
    if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){
      errEl.textContent='Incorrect email or password. Please try again.';
    }else if(e.code==='auth/user-disabled'){
      errEl.textContent='This account has been disabled. Contact your administrator.';
    }else if(e.code==='auth/too-many-requests'){
      errEl.textContent='Too many failed attempts. Please wait a few minutes and try again.';
    }else{
      errEl.textContent='Sign-in error: '+e.message;
    }
    errEl.style.display='block';
    btn.disabled=false; btn.textContent='🔐 Sign In';
  }
}

async function forgotPassword(){
  const email=(document.getElementById('loginEmail').value||'').trim();
  const errEl=document.getElementById('loginErr');
  if(!email){
    errEl.style.color='#E74C3C';
    errEl.textContent='Enter your email address in the field above, then click "Forgot password?"';
    errEl.style.display='block'; return;
  }
  try{
    await auth.sendPasswordResetEmail(email);
    errEl.style.color='#1A7A40';
    errEl.style.background='#F0FFF4';
    errEl.textContent='✅ Password reset email sent to '+email+'. Check your inbox (and spam folder).';
    errEl.style.display='block';
  }catch(e){
    errEl.style.color='#E74C3C';
    errEl.style.background='#FFF3F3';
    if(e.code==='auth/user-not-found')
      errEl.textContent='No account found with that email address.';
    else
      errEl.textContent='Error: '+e.message;
    errEl.style.display='block';
  }
}

function cSignOut(){ auth.signOut().then(()=>location.reload()); }

async function loadMyReports(email){
  try{
    const snap=await db.collection('reports')
      .where('allowedEmails','array-contains',email.toLowerCase())
      .orderBy('savedAt','desc').get();
    // Filter out soft-deleted reports — clients should never see trashed reports
    const reports=snap.docs.map(d=>({id:d.id,...d.data()})).filter(r=>!r.deleted);
    const el=document.getElementById('reportList');
    if(!reports.length){ el.innerHTML='<div class="empty">No reports have been shared with your account yet.</div>'; return; }
    el.innerHTML=reports.map(r=>{
      const allDone=(r.idfs||[]).every(i=>i.complete);
      const date=r.savedAt?.toDate?.()?.toLocaleDateString?.()||r.date||'—';
      return `<div class="report-row" onclick="showReport('${r.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <h4>${r.site||'Unknown Site'}</h4>
            <span>Ticket: ${r.ticket||'—'} &nbsp;·&nbsp; ${date} &nbsp;·&nbsp; ${(r.idfs||[]).length} rooms</span>
          </div>
          <span class="badge ${allDone?'badge-ok':'badge-warn'}">${allDone?'Complete':'In Progress'}</span>
        </div>
      </div>`;
    }).join('');
  }catch(e){ document.getElementById('reportList').innerHTML='<div class="empty">Error loading reports: '+e.message+'</div>'; }
}

async function showReport(id){
  const snap=await db.collection('reports').doc(id).get();
  if(!snap.exists){ alert('Report not found.'); return; }
  const r=snap.data();
  document.getElementById('listView').style.display='none';
  document.getElementById('detail').style.display='block';
  // Header
  document.getElementById('detailHeader').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px">
      <div class="ctitle" style="margin:0">${r.site||'—'}</div>
      ${r.excelUrl?`<a href="${r.excelUrl}" target="_blank" download
          style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#1D6F42;color:#fff;border-radius:7px;font-size:.78rem;font-weight:700;text-decoration:none">
          📊 Download Excel Report
        </a>`:''}
    </div>
    <div style="display:grid;gap:5px;grid-template-columns:1fr 1fr;font-size:.82rem">
      <div><strong>Ticket:</strong> ${r.ticket||'—'}</div>
      <div><strong>Date:</strong> ${r.date||'—'}</div>
      <div><strong>Client:</strong> ${r.client||'—'}</div>
      <div><strong>Technician:</strong> ${r.tech||'—'}</div>
      <div><strong>Address:</strong> ${r.addr||'—'}</div>
    </div>`;
  // IDFs
  document.getElementById('detailIdfs').innerHTML=(r.idfs||[]).map(idf=>{
    const portRows=Object.entries(idf.ports||{})
      .filter(([k,p])=>p.fn&&p.fn!=='empty')
      .sort((a,b)=>parseInt(a[0])-parseInt(b[0]))
      .map(([k,p])=>`<tr><td>${k}</td><td>${p.pp||''}</td><td>${(p.fn||'').replace('resident','Resident Unit').replace('ap','AP').replace('nonunit','Non-Unit').replace('uplink','Uplink').replace('unknown','Unknown')}</td><td>${p.unit||''}</td><td>${p.active?'✓':''}</td></tr>`)
      .join('');
    return `<div class="idf-block">
      <div class="idf-head">${idf.name} (${idf.type}) · ${idf.switchModel||'—'}</div>
      <table><thead><tr><th>Port</th><th>PP#</th><th>Function</th><th>Unit/Label</th><th>Active</th></tr></thead>
        <tbody>${portRows||'<tr><td colspan="5" style="text-align:center;color:#aaa;padding:8px">No ports recorded</td></tr>'}</tbody>
      </table>
    </div>`;
  }).join('');
  // Site map — full-width dedicated section
  document.getElementById('detailSiteMap').innerHTML=r.siteMapUrl?`
    <div class="card">
      <div class="ctitle">🗺 Site Map</div>
      <img class="sitemap-img" src="${r.siteMapUrl}" alt="Site Map with pins"
           onclick="window.open(this.src,'_blank')" title="Click to open full size">
      <p class="sitemap-note">
        📍 Numbered pins show IDF / room locations &nbsp;·&nbsp;
        Legend is printed along the top of the map &nbsp;·&nbsp;
        Click the image to open full size
      </p>
    </div>` : '';

  // Photos (site map excluded — shown separately above)
  const photos=[];
  (r.idfs||[]).forEach(idf=>{
    if(idf.photos?.overview?.url)   photos.push({url:idf.photos.overview.url,   label:idf.name+' — Overview'});
    if(idf.photos?.patchpanel?.url) photos.push({url:idf.photos.patchpanel.url, label:idf.name+' — Patch Panel'});
  });
  document.getElementById('detailPhotos').innerHTML=photos.map(p=>`
    <div style="text-align:center">
      <img class="photo-thumb" src="${p.url}" alt="${p.label}" onclick="window.open(this.src,'_blank')">
      <div style="font-size:.65rem;color:#7f8c8d;margin-top:2px">${p.label}</div>
    </div>`).join('')||'<p style="color:#aaa;font-size:.82rem">No photos available</p>';
}

function showList(){
  document.getElementById('detail').style.display='none';
  document.getElementById('listView').style.display='block';
}
</script>
</body>
</html>
